<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>
    <link rel="stylesheet" href="/css/style.css"> 
    <link rel="stylesheet" href="/css/register.css">
</head>
<body class="body_registro">

    <header>
        <div class="logo">MyOutfit</div>
         <nav class="main-nav">
            <a href="/html/index.html" class="active">Inicio</a>
            <a href="/html/chat.html">Chat</a>
            <a href="/html/armario.html">Armario</a>
        </nav>
        <div>
            <a href="/html/login.html"><img src="/img/login.png" alt="Iniciar Sesión" height="33" /></a>
        </div>
    </header>

    <main class="registro-container">
        <div class="registro-card">
            <h2>Crear Cuenta</h2>

            <form action="/api/user/register" method="post">

                     <div class="form-group">
                    <label for="correo">Correo electrónico</label>
                    <input type="email" id="correo" name="Email" required placeholder="ejemplo@correo.com">
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" name="Password" required minlength="6" placeholder="********">
                </div>

                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" name="Username" required placeholder="Ej: Ana">
                </div>

                <div class="form-group">
                    <label for="edad">Edad</label>
                    <input type="number" name="Age" required placeholder="Ej: 25">
                </div>

                <div class="form-group">
                    <label for="genero">Género</label>
                    <input type="text" name="Gender" required placeholder="Ej: Masculino">
                </div>

                <button type="submit" class="btn-registrar">Crear cuenta</button>

                <p class="registro-link">¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
            </form>
        </div>
    </main>

   <footer>
        <p>@QueMePongoOficial</p>
    </footer>

</body>
</html>
