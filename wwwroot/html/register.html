<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>
    <link rel="stylesheet" href="/css/style.css"> 
    <link rel="stylesheet" href="/css/register.css">
</head>
<body class="body_registro">

    <header>
        <div class="logo">MyOutfit</div>
         <nav class="main-nav">
            <a href="/html/index.html" class="active">Inicio</a>
            <a href="/html/chat.html">Chat</a>
            <a href="/html/armario.html">Armario</a>
        </nav>
        <div>
            <a href="/html/login.html"><img src="/img/login.png" alt="Iniciar Sesión" height="33" /></a>
        </div>
    </header>

    <main class="registro-container">
        <div class="registro-card">
            <h2>Crear Cuenta</h2>

            <form id="formRegistro">

                     <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="Email" required placeholder="ejemplo@correo.com" autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="Password" required minlength="6" placeholder="********" autocomplete="new-password">
                </div>

                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="Username" required placeholder="Ej: Ana" autocomplete="name">
                </div>

                <div class="form-group">
                    <label for="edad">Edad</label>
                    <input type="number" id="edad" name="Age" required placeholder="Ej: 25">
                </div>

                <div class="form-group">
                    <label for="genero">Género</label>
                        <select id="genero" name="Gender" required>
                        <option value="">Seleccione una opción</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Femenino">Femenino</option>
                        <option value="Otro">Otro</option>
                    </select>
                </div>

                <button type="submit" class="btn-registrar">Crear cuenta</button>

                <p class="registro-link">¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
            </form>
        </div>
    </main>

   <footer>
        <p>@QueMePongoOficial</p>
    </footer>

<script src="/js/register.js"></script>
</body>
</html>
