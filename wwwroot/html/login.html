<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="/css/style.css"> 
    <link rel="stylesheet" href="/css/login.css">
</head>
<body class="body_login">

    <header>
        <div class="logo">MyOutfit</div>
        <nav class="main-nav">
            <a href="/html/index.html" class="active">Inicio</a>
            <a href="/html/chat.html">Chat</a>
            <a href="/html/armario.html">Armario</a>
        </nav>
        <div>
            <a href="/html/login.html"><img src="/img/login.png" alt="Iniciar Sesión" height="33" /></a>
        </div>
    </header>

    <main class="login-container">
        <div class="login-card">
            <h2>Iniciar Sesión</h2>
            <form id="formLogin">
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" required placeholder="ejemplo@correo.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required placeholder="********" autocomplete="current-password">
                </div>
                <button type="submit" class="btn-login">Ingresar</button>
                <p class="register-link">¿No tienes cuenta? <a href="register.html">Regístrate aquí</a></p>
            </form>
        </div>
    </main>

      <footer>
        <p>@QueMePongoOficial</p>
    </footer>
<script src="/js/login.js"></script>
</body>
</html>
